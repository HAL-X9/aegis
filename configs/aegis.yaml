version: aegisconfig/v1

http:
  addr: ":8080"
  tls: null
  timeouts:
    read_timeout: 10s
    read_header_timeout: 5s
    write_timeout: 30s
    idle_timeout: 120s
  max_header_bytes: 1048576

observability:
  logging:
    level: info
    format: json
  tracing:
    enabled: false
    endpoint: "http://localhost:4318"
